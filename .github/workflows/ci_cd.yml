name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi
        # Install development dependencies
        pip install flake8 mypy pytest pytest-cov

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings (configurable)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type check with mypy
      run: |
        mypy . --ignore-missing-imports || true

    - name: Run tests with pytest
      run: |
        pytest --cov=. --cov-report=xml || echo "No tests found or tests skipped"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install build twine

    - name: Build executable with PyInstaller
      run: python build.py

    - name: Store distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: cxstar-pdf-download-executable
        path: dist/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
      id-token: write

    steps:
    - name: Download distribution packages
      uses: actions/download-artifact@v4
      with:
        name: cxstar-pdf-download-executable
        path: dist/

    - name: Generate version number
      id: version
      run: |
        if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]; then
          echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        else
          # Generate version from commit hash for main branch pushes
          SHORT_SHA=${GITHUB_SHA::7}
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "version=dev-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT
        fi

    - name: Extract release notes
      id: extract_notes
      run: |
        VERSION=${{ steps.version.outputs.version }}
        # Try to get release notes from CHANGELOG.md or create default
        if [ -f CHANGELOG.md ] && [ "${{ startsWith(github.ref, 'refs/tags/v') }}" == "true" ]; then
          # Extract section for this version from CHANGELOG
          awk "/^## \\[$VERSION\\]/,/^[##]/" CHANGELOG.md | head -n -1 > release_notes.txt
        else
          echo "## Release $VERSION" > release_notes.txt
          echo "" >> release_notes.txt
          echo "**Commit:** ${GITHUB_SHA::7}" >> release_notes.txt
          echo "**Branch:** ${GITHUB_REF_NAME}" >> release_notes.txt
          echo "**Time:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "### Changes in this release:" >> release_notes.txt
          git log -1 --pretty=format:"- %s" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "" >> release_notes.txt
          echo "*Automated build created by GitHub Actions.*" >> release_notes.txt
        fi
        cat release_notes.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
        tag_name: ${{ steps.version.outputs.version }}
        name: Release ${{ steps.version.outputs.version }}
        body_path: release_notes.txt
        draft: false
        prerelease: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && (contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta')) }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  notify:
    name: Notify Success/Failure
    runs-on: ubuntu-latest
    needs: [test, build, release]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
    - name: Check job status
      run: |
        echo "Workflow completed with status: ${{ needs.test.result }} / ${{ needs.build.result }} / ${{ needs.release.result }}"
        if [ "${{ needs.test.result }}" == "failure" ] || [ "${{ needs.build.result }}" == "failure" ] || [ "${{ needs.release.result }}" == "failure" ]; then
          echo "::warning::One or more jobs failed!"
          exit 1
        else
          echo "::notice::All jobs completed successfully!"
        fi
